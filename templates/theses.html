<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Theses</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">

    <h2 class="page-title">Đề án / Khóa luận</h2>

<form method="get">

    <!-- SEARCH -->
    <div class="search-box">
        <span class="icon"></span>
        <input name="q" value="{{ q }}" placeholder="Tìm đề tài hoặc giảng viên...">
    </div>

    <!-- MENU + FILTER -->
    <div class="top-bar">

        <!-- TABS -->
        <div class="tabs">
            <button name="type" value="all"
                class="tab {{ 'active' if type=='all' else '' }}">
                Tất cả
            </button>

            <button name="type" value="project"
                class="tab {{ 'active' if type=='project' else '' }}">
                Đề án
            </button>

            <button name="type" value="thesis"
                class="tab {{ 'active' if type=='thesis' else '' }}">
                Khóa luận
            </button>
        </div>

        <!-- FILTER YEAR -->
        <select name="year" onchange="this.form.submit()">
            <option value="">-- Năm --</option>
            {% for y in years %}
                <option value="{{ y['year'] }}" {{ 'selected' if year == y['year'] else '' }}>
                    {{ y['year'] }}
                </option>
            {% endfor %}
        </select>

    </div>

</form>

    <!-- LIST -->
    <div class="list">
{% for t in theses %}
    <div class="card">

    <div class="year">
        {{ t["published_at"][:4] if t["published_at"] else "" }}
    </div>

    <div class="type {{ 'project' if t['type_name']=='Đề án' else 'thesis' }}">
        {{ t["type_name"] }}
    </div>

    <h3 class="title">{{ t["title"] }}</h3>

    <p class="lecturer">{{ t["lecturer_name"] }}</p>

    <div class="actions">
        <a href="{{ t['source_code_url'] or '#' }}"
           class="link {{ 'disabled' if not t['source_code_url'] else '' }}">
            &lt;/&gt;Source code
        </a>

        <a href="{{ t['file_url'] or '#' }}"
           class="link {{ 'disabled' if not t['file_url'] else '' }}">
            ⬇Download
        </a>
    </div>

    <a href="/theses/{{ t['id'] }}" class="detail-btn">Xem chi tiết</a>

</div>
{% endfor %}
</div>

</div>
</body>
</html>
